name: Notify New LLM Repo Issues

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes; edit as you like (min interval 5)
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write            # needed to commit the updated state/last_check.txt

jobs:
  check-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new issues and notify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}        # you set this secret yourself
        run: python3 scripts/check_new_issues.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last_check.txt
          git diff --staged --quiet || git commit -m "Update last check timestamp [skip ci]"
          git push
